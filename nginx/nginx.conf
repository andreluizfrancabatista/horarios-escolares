server {
    listen 80;
    server_name _;
    client_max_body_size 20M;

    # Frontend (React)
    location / {
        proxy_pass http://horarios_frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Backend API (FastAPI)
    location /api/ {
        proxy_pass http://horarios_backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Swagger UI (dev/homologação)
    location /docs {
        proxy_pass http://horarios_backend:8000/docs;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://horarios_backend:8000/openapi.json;
    }
}
