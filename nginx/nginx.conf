server {
    listen 80;
    server_name _;
    client_max_body_size 20M;

    # Frontend (React) — sob o subpath
    location /horarios-escolares/ {
        proxy_pass http://horarios_frontend:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API (FastAPI) — sob o subpath
    location /horarios-escolares/api/ {
        proxy_pass http://horarios_backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Swagger UI
    location /horarios-escolares/docs {
        proxy_pass http://horarios_backend:8000/docs;
        proxy_set_header Host $host;
    }

    location /horarios-escolares/openapi.json {
        proxy_pass http://horarios_backend:8000/openapi.json;
    }
}