services:
  db:
    image: postgres:16-alpine
    container_name: horarios_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-horarios}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-horarios123}
      POSTGRES_DB: ${POSTGRES_DB:-horarios_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - horarios_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-horarios}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: horarios_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-horarios}:${POSTGRES_PASSWORD:-horarios123}@db:5432/${POSTGRES_DB:-horarios_db}
      SECRET_KEY: ${SECRET_KEY:-changeme-super-secret-key-32chars}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-480}
      FIRST_ADMIN_EMAIL: ${FIRST_ADMIN_EMAIL:-admin@escola.edu.br}
      FIRST_ADMIN_PASSWORD: ${FIRST_ADMIN_PASSWORD:-admin123}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - horarios_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: horarios_frontend
    restart: unless-stopped
    networks:
      - horarios_net

  nginx:
    image: nginx:alpine
    container_name: horarios_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - horarios_net

volumes:
  postgres_data:

networks:
  horarios_net:
    driver: bridge
